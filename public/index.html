<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>To-do List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .was-validated .form-control:invalid {
      border-color: #dc3545;
    }
    .was-validated .form-control:valid {
      border-color: #198754;
    }
  </style>
</head>
<body class="bg-light p-4">
  <div class="container">
    <h1 class="mb-4 text-center">Lista de tarefas</h1>

    <div id="auth-section" class="mb-4">
      <ul class="nav nav-tabs mb-3" id="authTabs">
        <li class="nav-item">
          <a class="nav-link active" data-bs-toggle="tab" href="#login-tab">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-bs-toggle="tab" href="#register-tab">Registrar</a>
        </li>
      </ul>

      <div class="tab-content">
        <!-- Login -->
        <div class="tab-pane fade show active" id="login-tab">
          <form id="login-form">
            <input type="email" class="form-control mb-2" id="email" placeholder="E-mail" required>
            <input type="password" class="form-control mb-2" id="password" placeholder="Senha" required>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
            <!-- <a href="http://localhost/todo/Auth/public/api/google/login" class="btn btn-danger w-100 mt-2">
                Entrar com Google
              </a> -->
          </form>
        </div>

        <!-- Registro -->
        <div class="tab-pane fade" id="register-tab">
          <form id="register-form">
            <input type="text" class="form-control mb-2" id="register-name" placeholder="Nome completo" required>
            <input type="email" class="form-control mb-2" id="register-email" placeholder="E-mail" required>
            <input type="password" class="form-control mb-2" id="register-password" placeholder="Senha" required>
            <button type="submit" class="btn btn-success w-100" >Registrar</button>
          </form>
        </div>
      </div>
    </div>

    <div id="app-section" class="d-none">

        <h4>Minhas Listas</h4>
        <form id="list-form" class="d-flex gap-2 mb-3">
            <input type="text" id="list-title" class="form-control" placeholder="Nova lista" required>
            <button class="btn btn-success">Criar</button>
            <button id="logout-btn" class="btn btn-danger float-end mb-3">Sair</button>
      </form>
      <ul id="lists" class="list-group mb-4"></ul>

      <div id="tasks-section" class="d-none">
        <h4 id="list-title-view">Tarefas</h4>
        <form id="task-form" class="d-flex gap-2 mb-3">
          <input type="text" id="task-title" class="form-control" placeholder="Nova tarefa" required>
          <button class="btn btn-success">Adicionar</button>
        </form>
        <ul id="tasks" class="list-group"></ul>
      </div>
    </div>

    <!-- Google Lists UI -->
    <!-- <div class="container mt-4" id="googleTasksSection" style="display: none;">
      <h3 class="mb-3">Listas do Google Tasks</h3>
      <div id="googleListsContainer" class="accordion"></div>
    </div> -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
